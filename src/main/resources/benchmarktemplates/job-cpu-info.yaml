apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app: cpu-info
  name: job-cpu-info
spec:
  template:
    metadata:
      labels:
        batch.kubernetes.io/job-name: job-cpu-info
        job-name: job-cpu-info
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: ${engine.machineType}
      containers:
      - command:
        - /bin/sh
        - -c
        - cat /proc/cpuinfo
        image: busybox
        name: cpu-info
      restartPolicy: Never
